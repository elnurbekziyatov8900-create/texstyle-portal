# TexStyle Portal — Nginx reverse proxy
# Tashqi 80/443-portdan ichki Node ilovasiga (localhost:3000) yo'naltiradi.
# Joylashuv: /etc/nginx/sites-available/texstyle  (symlink → sites-enabled)

upstream texstyle_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name texstyle.duckdns.org _;

    # Gzip siqish (B.M2 optimallashtirish)
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Statik fayllarni Nginx to'g'ridan-to'g'ri beradi (keshlash bilan)
    location /static/ {
        proxy_pass http://texstyle_app;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health-check (ALB target uchun)
    location /health {
        proxy_pass http://texstyle_app/health;
        access_log off;
    }

    # Barcha boshqa so'rovlar Node ilovasiga (reverse proxy)
    location / {
        proxy_pass http://texstyle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
